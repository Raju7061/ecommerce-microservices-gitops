apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: raju
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          ports:
            - containerPort: 9200
          volumeMounts:
            - name: elastic-storage
              mountPath: /usr/share/elasticsearch/data
      volumes:
        - name: elastic-storage
          persistentVolumeClaim:
            claimName: ecom-elastic-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: raju
spec:
  ports:
    - port: 9200
  selector:
    app: elasticsearch