apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: raju
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          args: ["-c", "wal_level=logical"]
          env:
            - name: POSTGRES_DB
              value: ecommerce
            - name: POSTGRES_USER
              value: pgadmin
            - name: POSTGRES_PASSWORD
              value: password123
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: ecom-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: raju
spec:
  ports:
    - port: 5432
  selector:
    app: postgres