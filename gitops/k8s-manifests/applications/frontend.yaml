apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: raju
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 2024dock/frontend:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: raju
spec:
  ports:
    - port: 80
  selector:
    app: frontend