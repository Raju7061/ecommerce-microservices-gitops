---
# 1. Infrastructure Kustomization
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: raju-infrastructure
  namespace: flux-system
spec:
  interval: 1m
  path: ./gitops/k8s-manifests/infrastructure
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system

---
# 2. Application HelmRelease
apiVersion: helm.toolkit.fluxcd.io/v1beta2
kind: HelmRelease
metadata:
  name: raju-stack
  namespace: raju
spec:
  interval: 1m
  chart:
    spec:
      chart: ./gitops/k8s-manifests/applications
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system # Yeh zaroori hai taaki cross-namespace access ho
  values:
    global:
      tag: "v26.100.5"
