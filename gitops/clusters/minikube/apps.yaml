---
# 1. Infrastructure Kustomization: Yeh 'raju' namespace aur baki infra banayega
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: raju-infrastructure
  namespace: flux-system
spec:
  interval: 1m
  path: ./gitops/k8s-manifests/infrastructure
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system

---
# 2. Application HelmRelease: Yeh infrastructure ke baad deploy hoga
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: raju-stack
  namespace: raju
spec:
  interval: 1m
  # 'dependsOn' ensure karta hai ki pehle namespace ban jaye
  dependsOn:
    - name: raju-infrastructure
      namespace: flux-system
  chart:
    spec:
      chart: ./gitops/k8s-manifests/applications
      sourceRef:
        kind: GitRepository
        name: flux-system
  values:
    global:
      tag: "v26.100.5"