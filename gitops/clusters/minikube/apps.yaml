# 1. Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: raju
---
# 2. Helm Repository (Standard HTTPS - No OCI error)
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: raju-charts
  namespace: flux-system
spec:
  interval: 5m
  url: https://charts.bitnami.com/bitnami
---
# 3. HelmRelease (The one you want to see 'Succeeded')
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: raju-stack
  namespace: raju
spec:
  releaseName: raju-stack
  interval: 1m
  chart:
    spec:
      chart: kafka
      version: "26.100.2" # Fixed version
      sourceRef:
        kind: HelmRepository
        name: raju-charts
        namespace: flux-system
  values:
    replicaCount: 1
    # Yahan tumhari services ka deployment logic wahi rahega
