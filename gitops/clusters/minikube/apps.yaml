# 1. Infrastructure Layer
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: raju-infrastructure
  namespace: flux-system
spec:
  interval: 1m
  path: "./gitops/k8s-manifests/infrastructure"
  sourceRef:
    kind: GitRepository
    name: flux-system
  prune: true
  wait: true
---
# 2. Applications Layer
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: raju-applications
  namespace: flux-system
spec:
  interval: 1m
  dependsOn:
    - name: raju-infrastructure
  path: "./gitops/k8s-manifests/applications"
  sourceRef:
    kind: GitRepository
    name: flux-system
  prune: true
  wait: true
  # Image patching (Flux native feature)
  images:
    - name: 2024dock/auth-service
      newTag: "1.0.0"
    - name: 2024dock/product-service
      newTag: "1.0.0"
    - name: 2024dock/order-service
      newTag: "1.0.0"
    - name: 2024dock/frontend
      newTag: "1.0.0"
