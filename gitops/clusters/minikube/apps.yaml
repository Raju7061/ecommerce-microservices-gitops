apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: raju-stack-infrastructure
  namespace: flux-system
spec:
  interval: 1m
  path: "./gitops/k8s-manifests/infrastructure"
  sourceRef:
    kind: GitRepository
    name: flux-system
  prune: true
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: raju-stack-applications
  namespace: flux-system
spec:
  interval: 1m
  dependsOn:
    - name: raju-stack-infrastructure
  path: "./gitops/k8s-manifests/applications"
  sourceRef:
    kind: GitRepository
    name: flux-system
  prune: true
  wait: true
  # Global System Release Tag tracking details block
  # GitHub Actions automatic is pure block ko modify karega naye release par
  images:
    - name: 2024dock/auth-service
      newTag: "1.0.0"
    - name: 2024dock/product-service
      newTag: "1.0.0"
    - name: 2024dock/order-service
      newTag: "1.0.0"
    - name: 2024dock/frontend
      newTag: "1.0.0"