name: Dynamic GitOps Semantic Release Automation

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/**'
      - 'gitops/**'

jobs:
  determine-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }} # Admin token for unlocking protected pushes

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          username: 2024dock
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Extract context state & calculate release paths
      - name: Calculate New Versions
        id: versions
        run: |
          # Git tags explicitly fetch karna takia exact history track ho
          git fetch --tags
          
          PREV_RELEASE=$(git tag -l "v26.*" | sort -V | tail -n1)
          if [ -z "$PREV_RELEASE" ]; then PREV_RELEASE="v26.100.0"; fi
          
          BASE_VERSION=$(echo $PREV_RELEASE | cut -d. -f1-2)
          PATCH_VERSION=$(echo $PREV_RELEASE | cut -d. -f3)
          NEW_GLOBAL_PATCH=$((PATCH_VERSION + 1))
          NEW_GLOBAL_RELEASE="$BASE_VERSION.$NEW_GLOBAL_PATCH"
          
          echo "NEW_GLOBAL_RELEASE=$NEW_GLOBAL_RELEASE" >> $GITHUB_ENV
          echo "SVC_VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      # 2. Compile and push ALL individual builds simultaneously to Docker Hub
      - name: Build & Push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/auth-service
          push: true
          tags: 2024dock/auth-service:${{ env.SVC_VERSION }}

      - name: Build & Push Order Service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/order-service
          push: true
          tags: 2024dock/order-service:${{ env.SVC_VERSION }}

      - name: Build & Push Product Service
        uses: docker/build-push-action@v5
        with:
          context: ./apps/product-service
          push: true
          tags: 2024dock/product-service:${{ env.SVC_VERSION }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          tags: 2024dock/frontend:${{ env.SVC_VERSION }}

      # 3. Automate HelmRelease Target Updates into apps.yaml
      - name: Update Flux HelmRelease Target
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "gitops-bot"
          git config --global user.email "bot@gitops.com"
          
          TARGET_FILE="gitops/clusters/minikube/apps.yaml"
          
          # 1. Helm Release Chart ka Main Version update karein (Taaki flux get hr me v26.100.x dikhe)
          sed -i "s/version: \"26\..*\"/version: \"${{ env.NEW_GLOBAL_RELEASE }}\"/g" $TARGET_FILE
          
          # 2. Values block ke andar saari images ke tags ko fresh SVC_VERSION se sync karein
          sed -i "s|image: \"2024dock/auth-service:.*\"|image: \"2024dock/auth-service:${{ env.SVC_VERSION }}\"|g" $TARGET_FILE
          sed -i "s|image: \"2024dock/order-service:.*\"|image: \"2024dock/order-service:${{ env.SVC_VERSION }}\"|g" $TARGET_FILE
          sed -i "s|image: \"2024dock/product-service:.*\"|image: \"2024dock/product-service:${{ env.SVC_VERSION }}\"|g" $TARGET_FILE
          sed -i "s|image: \"2024dock/frontend:.*\"|image: \"2024dock/frontend:${{ env.SVC_VERSION }}\"|g" $TARGET_FILE
          
          # Stage, local commit execution aur [skip ci] logic injection loop se bachne ke liye
          git add $TARGET_FILE
          git commit -m "chore(release): trigger rollout v${{ env.NEW_GLOBAL_RELEASE }} [skip ci]" || echo "No files modified"
          
          # Remote target validation override through secure GH_PAT URL
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          git push origin main

      # 4. Native tagging execution step
      - name: Create System Release Tag
        run: |
          git tag ${{ env.NEW_GLOBAL_RELEASE }}
          git push origin ${{ env.NEW_GLOBAL_RELEASE }}