name: Dynamic GitOps Semantic Release Automation

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/**'

jobs:
  determine-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }} # Admin token for unlocking protected pushes

      # 1. Detect which application directory actually changed
      - name: Check Changed Services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth: ['apps/auth-service/**']
            product: ['apps/product-service/**']
            order: ['apps/order-service/**']
            frontend: ['apps/frontend/**']

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          username: 2024dock
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Extract context state & calculate release paths
      - name: Calculate New Versions
        id: versions
        run: |
          # Git tags explicitly fetch karna takia exact history track ho
          git fetch --tags
          
          PREV_RELEASE=$(git tag -l "v26.*" | sort -V | tail -n1)
          if [ -z "$PREV_RELEASE" ]; then PREV_RELEASE="v26.100.0"; fi
          
          BASE_VERSION=$(echo $PREV_RELEASE | cut -d. -f1-2)
          PATCH_VERSION=$(echo $PREV_RELEASE | cut -d. -f3)
          NEW_GLOBAL_PATCH=$((PATCH_VERSION + 1))
          NEW_GLOBAL_RELEASE="$BASE_VERSION.$NEW_GLOBAL_PATCH"
          
          echo "NEW_GLOBAL_RELEASE=$NEW_GLOBAL_RELEASE" >> $GITHUB_ENV
          echo "SVC_VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      # 3. Compile and push individual builds conditionally
      - name: Build & Push Auth Service
        if: steps.filter.outputs.auth == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/auth-service
          push: true
          tags: 2024dock/auth-service:${{ env.SVC_VERSION }}

      - name: Build & Push Order Service
        if: steps.filter.outputs.order == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/order-service
          push: true
          tags: 2024dock/order-service:${{ env.SVC_VERSION }}

      - name: Build & Push Product Service
        if: steps.filter.outputs.product == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/product-service
          push: true
          tags: 2024dock/product-service:${{ env.SVC_VERSION }}

      - name: Build & Push Frontend
        if: steps.filter.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          tags: 2024dock/frontend:${{ env.SVC_VERSION }}

      # 4. Automate Kustomize Multi-Line Text Updates into apps.yaml
      - name: Update Flux Kustomization Target
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "gitops-bot"
          git config --global user.email "bot@gitops.com"
          
          TARGET_FILE="gitops/clusters/minikube/apps.yaml"
          
          # Pure document me version entries track karke sync karein
          sed -i "s/version: .*/version: \"${{ env.NEW_GLOBAL_RELEASE }}\"/g" $TARGET_FILE
          
          # Context-Aware Kustomize matching rewrite block
          if [ "${{ steps.filter.outputs.auth }}" = "true" ]; then
            sed -i "/name: 2024dock\/auth-service/{n;s/newTag: .*/newTag: \"${{ env.SVC_VERSION }}\"/}" $TARGET_FILE
          fi
          
          if [ "${{ steps.filter.outputs.order }}" = "true" ]; then
            sed -i "/name: 2024dock\/order-service/{n;s/newTag: .*/newTag: \"${{ env.SVC_VERSION }}\"/}" $TARGET_FILE
          fi
          
          if [ "${{ steps.filter.outputs.product }}" = "true" ]; then
            sed -i "/name: 2024dock\/product-service/{n;s/newTag: .*/newTag: \"${{ env.SVC_VERSION }}\"/}" $TARGET_FILE
          fi
          
          if [ "${{ steps.filter.outputs.frontend }}" = "true" ]; then
            sed -i "/name: 2024dock\/frontend/{n;s/newTag: .*/newTag: \"${{ env.SVC_VERSION }}\"/}" $TARGET_FILE
          fi
          
          # Stage, local commit execution aur [skip ci] logic injection
          git add $TARGET_FILE
          git commit -m "chore(release): trigger rollout v${{ env.NEW_GLOBAL_RELEASE }} [skip ci]" || echo "No files modified"
          
          # Remote target validation override through secure GH_PAT URL
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          git push origin main

      # 5. Native tagging execution step
      - name: Create System Release Tag
        run: |
          git tag ${{ env.NEW_GLOBAL_RELEASE }}
          git push origin ${{ env.NEW_GLOBAL_RELEASE }}