name: Dynamic GitOps Semantic Release Automation

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'

jobs:
  determine-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: 2024dock
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Calculate Versions
        run: |
          git fetch --tags

          PREV_RELEASE=$(git tag -l "v26.*" | sort -V | tail -n1)

          if [ -z "$PREV_RELEASE" ]; then
            PREV_RELEASE="v26.100.0"
          fi

          BASE_VERSION=$(echo $PREV_RELEASE | cut -d. -f1-2)
          PATCH=$(echo $PREV_RELEASE | cut -d. -f3)

          NEW_GLOBAL_RELEASE="$BASE_VERSION.$((PATCH + 1))"

          echo "NEW_GLOBAL_RELEASE=$NEW_GLOBAL_RELEASE" >> $GITHUB_ENV
          echo "SVC_VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build and Push Docker Images
        run: |
          SERVICES=("auth-service" "order-service" "product-service" "frontend")

          for svc in "${SERVICES[@]}"
          do
            docker build \
              -t 2024dock/$svc:${{ env.SVC_VERSION }} \
              ./apps/$svc

            docker push \
              2024dock/$svc:${{ env.SVC_VERSION }}
          done

      - name: Update Helm values.yaml
        run: |
          git config --global user.name "gitops-bot"
          git config --global user.email "bot@gitops.com"

          git fetch origin main
          git reset --hard origin/main

          TARGET="gitops/k8s-manifests/applications/values.yaml"

          sed -i 's|version: ".*"|version: "${{ env.NEW_GLOBAL_RELEASE }}"|g' $TARGET
          sed -i '/authService:/,/tag:/ s|tag: ".*"|tag: "${{ env.SVC_VERSION }}"|' $TARGET
          sed -i '/frontend:/,/tag:/ s|tag: ".*"|tag: "${{ env.SVC_VERSION }}"|' $TARGET
          sed -i '/orderService:/,/tag:/ s|tag: ".*"|tag: "${{ env.SVC_VERSION }}"|' $TARGET
          sed -i '/productService:/,/tag:/ s|tag: ".*"|tag: "${{ env.SVC_VERSION }}"|' $TARGET

          git add $TARGET

          if ! git diff --cached --quiet; then
            git commit -m "chore(release): ${{
            env.NEW_GLOBAL_RELEASE }} [skip ci]"

            git remote set-url origin \
              https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

            git push origin main
          fi

      - name: Create Release Tag
        run: |
          git tag -f ${{ env.NEW_GLOBAL_RELEASE }}
          git push origin ${{ env.NEW_GLOBAL_RELEASE }} --force