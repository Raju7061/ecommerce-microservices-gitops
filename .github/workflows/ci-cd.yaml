name: Dynamic GitOps Semantic Release Automation

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/**'

jobs:
  determine-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          username: 2024dock
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Calculate New Versions
        run: |
          git fetch --tags
          PREV_RELEASE=$(git tag -l "v26.*" | sort -V | tail -n1)
          [ -z "$PREV_RELEASE" ] && PREV_RELEASE="v26.100.0"
          BASE_VERSION=$(echo $PREV_RELEASE | cut -d. -f1-2)
          NEW_GLOBAL_RELEASE="$BASE_VERSION.$(( $(echo $PREV_RELEASE | cut -d. -f3) + 1 ))"
          echo "NEW_GLOBAL_RELEASE=$NEW_GLOBAL_RELEASE" >> $GITHUB_ENV
          echo "SVC_VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Build & Push Images
        run: |
          for svc in auth-service order-service product-service frontend; do
            docker build -t 2024dock/$svc:${{ env.SVC_VERSION }} ./apps/$svc
            docker push 2024dock/$svc:${{ env.SVC_VERSION }}
          done

      - name: Update Flux Manifests
        run: |
          git config --global user.name "gitops-bot"
          git config --global user.email "bot@gitops.com"
          
          # Force sync with remote to avoid non-fast-forward errors
          git fetch origin main
          git reset --hard origin/main
          
          TARGET="gitops/clusters/minikube/apps.yaml"
          
          # Update values
          sed -i "s|tag: \".*\"|tag: \"${{ env.NEW_GLOBAL_RELEASE }}\"|g" $TARGET
          sed -i "s|auth-service: \".*\"|auth-service: \"2024dock/auth-service:${{ env.SVC_VERSION }}\"|g" $TARGET
          sed -i "s|order-service: \".*\"|order-service: \"2024dock/order-service:${{ env.SVC_VERSION }}\"|g" $TARGET
          sed -i "s|product-service: \".*\"|product-service: \"2024dock/product-service:${{ env.SVC_VERSION }}\"|g" $TARGET
          sed -i "s|frontend: \".*\"|frontend: \"2024dock/frontend:${{ env.SVC_VERSION }}\"|g" $TARGET
          
          # Commit and Push
          git add $TARGET
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): update to ${{ env.NEW_GLOBAL_RELEASE }} [skip ci]"
            git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
            git push origin main
          fi
          
          # Tagging
          git tag -f ${{ env.NEW_GLOBAL_RELEASE }}
          git push origin ${{ env.NEW_GLOBAL_RELEASE }} --force
